# ==========================================================
# Project Information
# ==========================================================

project:
  name: titanic-production-ml
  version: 1.0.0
  stage: development

# ==========================================================
# Data
# ==========================================================

data:

  train_data_path: data/raw/train.csv

  test_data_path: data/raw/test.csv

  prediction_data_path: data/raw/predict.csv

# ==========================================================
# Artifact Paths
# ==========================================================

artifacts:

  root_dir: artifacts

  data_ingestion:

    root_dir: artifacts/data_ingestion

    train_file: artifacts/data_ingestion/train.csv

    test_file: artifacts/data_ingestion/test.csv

  data_validation:

    root_dir: artifacts/data_validation

    validation_report: artifacts/data_validation/report.yaml

    validation_status: artifacts/data_validation/status.txt

  data_transformation:

    root_dir: artifacts/data_transformation

    X_train: artifacts/data_transformation/X_train.npy

    y_train: artifacts/data_transformation/y_train.npy

    X_test: artifacts/data_transformation/X_test.npy

    y_test: artifacts/data_transformation/y_test.npy

    preprocessor: artifacts/data_transformation/preprocessor.joblib

  model_trainer:

    root_dir: artifacts/model_trainer

    trained_model: artifacts/model_trainer/model.joblib

    metrics: artifacts/model_trainer/metrics.json

    leaderboard: artifacts/model_trainer/leaderboard.csv


  model_training:

    random_state: 42

    cv_folds: 5

    scoring: accuracy

# ==========================================================
# Model Parameters
# ==========================================================

model:

  random_state: 42

  test_size: 0.20

# ==========================================================
# Logging
# ==========================================================

logging:

  level: INFO

  log_dir: logs

  file_name: titanic.log


# ==========================================================
# Training
# ==========================================================

training:
  target_column: Survived
  test_size: 0.2
  random_state: 42